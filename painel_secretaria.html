<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recepção — Dra. Vanessa Wendling</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --rose:#F0778B; --rose-l:#FDF2F4; --rose-m:#F7A1AD;
  --dark:#2C2328; --mid:#6B5B60; --light:#9CA3AF;
  --border:#F3E1E4; --cream:#FAF7F5; --white:#fff;
  --green:#059669; --green-l:#D1FAE5;
  --amber:#D4905A; --amber-l:#FDF3EC;
  --red:#C0392B; --red-l:#FDEEEC;
  --blue:#4A7FA5; --blue-l:#EBF3F9;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Montserrat',sans-serif;background:var(--cream);color:var(--dark);min-height:100vh;}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--rose-m);border-radius:10px}

/* TOPO */
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:20;}
.topbar-left{display:flex;align-items:center;gap:14px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--rose);animation:pulse 2s infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.4)}}
.topbar-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--rose);}
.topbar-sub{font-size:11px;color:var(--mid);margin-top:1px;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.clock{font-size:22px;font-weight:600;color:var(--dark);font-variant-numeric:tabular-nums;font-family:'Cormorant Garamond',serif;}
.date-lbl{font-size:11px;color:var(--mid);text-align:right;margin-top:1px;}

/* CONTEÚDO */
.page{max-width:860px;margin:0 auto;padding:24px 20px 48px;}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px;}
.stat{background:var(--white);border:1px solid var(--border);border-radius:13px;padding:14px 18px;}
.stat-val{font-size:28px;font-weight:700;font-family:'Cormorant Garamond',serif;color:var(--dark);}
.stat-lbl{font-size:11px;color:var(--mid);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
.stat-red .stat-val{color:var(--red);}
.stat-green .stat-val{color:var(--green);}
.stat-amber .stat-val{color:var(--amber);}

/* CARD */
.card{background:var(--white);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:16px;}
.card-head{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.card-title{font-size:13px;font-weight:700;color:var(--dark);}

/* FILTROS */
.filters{display:flex;gap:8px;flex-wrap:wrap;}
.filter-btn{padding:5px 13px;border-radius:20px;border:1px solid var(--border);background:var(--white);font-size:12px;font-weight:600;color:var(--mid);cursor:pointer;transition:all .2s;font-family:'Montserrat',sans-serif;}
.filter-btn.active{background:var(--rose);color:white;border-color:var(--rose);}

/* LINHA DE PACIENTE */
.pac-row{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;transition:background .15s;cursor:pointer;}
.pac-row:last-child{border-bottom:none;}
.pac-row:hover{background:var(--rose-l);}
.pac-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0;font-family:'Cormorant Garamond',serif;}
.av-green{background:var(--green-l);color:var(--green);}
.av-red{background:var(--red-l);color:var(--red);}
.av-amber{background:var(--amber-l);color:var(--amber);}
.av-blue{background:var(--blue-l);color:var(--blue);}
.pac-info{flex:1;min-width:0;}
.pac-name{font-size:14px;font-weight:700;color:var(--dark);}
.pac-sub{font-size:12px;color:var(--mid);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pac-right{text-align:right;flex-shrink:0;}
.pac-time{font-size:12px;color:var(--mid);}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;margin-top:4px;}
.b-green{background:var(--green-l);color:var(--green);}
.b-red{background:var(--red-l);color:var(--red);}
.b-amber{background:var(--amber-l);color:var(--amber);}
.b-blue{background:var(--blue-l);color:var(--blue);}
.b-gray{background:#F3F4F6;color:#6B7280;}
.alert-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px;}
.alert-tag{font-size:10px;background:var(--red-l);color:var(--red);padding:2px 7px;border-radius:20px;font-weight:600;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadein .2s;}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.modal{background:white;border-radius:18px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.2);animation:modalup .25s ease;}
@keyframes modalup{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.modal-head{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--mid);line-height:1;padding:0;}
.modal-body{padding:20px 24px;}
.modal-sec{font-size:10px;font-weight:700;color:var(--mid);text-transform:uppercase;letter-spacing:1px;margin:16px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.modal-sec:first-child{margin-top:0;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.info-item{background:var(--cream);border-radius:8px;padding:9px 12px;}
.info-lbl{font-size:10px;font-weight:700;color:var(--mid);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;}
.info-val{font-size:12px;color:var(--dark);line-height:1.4;}
.info-val.alert{color:var(--red);font-weight:700;}
.info-val.warn{color:var(--amber);font-weight:700;}
.resumo-box{background:var(--rose-l);border:1px solid var(--rose-m);border-radius:10px;padding:14px;font-size:13px;line-height:1.7;color:var(--dark);}
.alerta-item{display:flex;gap:8px;padding:8px 10px;background:var(--red-l);border-left:3px solid var(--red);border-radius:6px;margin-bottom:6px;font-size:12px;color:var(--dark);line-height:1.5;}
.chip{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;margin:2px;}
.chip-h{background:var(--red-l);color:var(--red);}
.chip-m{background:var(--amber-l);color:var(--amber);}
.chip-l{background:var(--blue-l);color:var(--blue);}
.modal-foot{padding:14px 24px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}

/* BOTÕES */
.btn{padding:9px 18px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px;font-family:'Montserrat',sans-serif;transition:all .2s;}
.btn-primary{background:var(--rose);color:white;}
.btn-primary:hover{background:#d4566c;}
.btn-outline{background:white;color:var(--mid);border:1px solid var(--border);}
.btn-outline:hover{border-color:var(--rose);color:var(--rose);}
.btn-sm{padding:6px 13px;font-size:12px;}

/* VAZIO */
.empty{text-align:center;padding:44px 20px;color:var(--mid);}
.empty-icon{font-size:38px;margin-bottom:12px;opacity:.4;}

/* ATUALIZAÇÃO AUTO */
.auto-badge{font-size:11px;color:var(--green);background:var(--green-l);padding:3px 10px;border-radius:20px;font-weight:600;}

/* BUSCA */
.search-wrap{padding:12px 20px;border-bottom:1px solid var(--border);}
.search-input{width:100%;padding:9px 14px;border:1px solid var(--border);border-radius:9px;font-size:13px;font-family:'Montserrat',sans-serif;color:var(--dark);background:var(--cream);outline:none;transition:border-color .2s;}
.search-input:focus{border-color:var(--rose);background:white;}

@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin 1s linear infinite;}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <span class="dot"></span>
    <div>
      <div class="topbar-title">Recepção — Dra. Vanessa Wendling</div>
      <div class="topbar-sub">Triagens do dia · <span id="auto-lbl" class="auto-badge">Atualização automática</span></div>
    </div>
  </div>
  <div class="topbar-right">
    <div style="text-align:right">
      <div class="clock" id="clock">--:--</div>
      <div class="date-lbl" id="date-lbl"></div>
    </div>
    <button class="btn btn-outline btn-sm" onclick="carregar(true)">↻ Atualizar</button>
  </div>
</div>

<!-- CONTEÚDO -->
<div class="page">

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat"><div class="stat-val" id="st-total">—</div><div class="stat-lbl">Triagens hoje</div></div>
    <div class="stat stat-green"><div class="stat-val" id="st-ok">—</div><div class="stat-lbl">Com análise IA</div></div>
    <div class="stat stat-red"><div class="stat-val" id="st-alerta">—</div><div class="stat-lbl">Alertas críticos</div></div>
    <div class="stat stat-amber"><div class="stat-val" id="st-aguard">—</div><div class="stat-lbl">Sem análise</div></div>
  </div>

  <!-- LISTA -->
  <div class="card">
    <div class="card-head">
      <span class="card-title">📋 Pacientes de Hoje</span>
      <div class="filters" id="filtros">
        <button class="filter-btn active" onclick="setFiltro('todos',this)">Todos</button>
        <button class="filter-btn" onclick="setFiltro('alerta',this)">⚠ Alertas</button>
        <button class="filter-btn" onclick="setFiltro('ok',this)">✓ Com análise</button>
        <button class="filter-btn" onclick="setFiltro('sem',this)">Sem análise</button>
      </div>
    </div>
    <div class="search-wrap">
      <input type="text" class="search-input" id="busca" placeholder="🔍 Buscar paciente..." oninput="renderLista()">
    </div>
    <div id="lista-pacientes"><div class="empty"><div class="empty-icon">⏳</div><div>Carregando...</div></div></div>
  </div>

</div>

<!-- MODAL DETALHES -->
<div class="overlay" id="modal" style="display:none" onclick="if(event.target===this)fecharModal()">
  <div class="modal">
    <div class="modal-head">
      <div>
        <div style="font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600" id="modal-nome"></div>
        <div style="font-size:12px;color:var(--mid);margin-top:3px" id="modal-sub"></div>
      </div>
      <button class="modal-close" onclick="fecharModal()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-foot">
      <button class="btn btn-outline btn-sm" onclick="fecharModal()">Fechar</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════
// ⚙️ CONFIGURAÇÃO
// ══════════════════════════════════════════════════
var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxNYQ25rS2JjS8H8gVCIsxAT0G17eQ1o_vC4hV79XmdgLm08MHuDm5nneXeBFSnbNud/exec";

// Intervalo de atualização automática (em segundos)
var INTERVALO_AUTO = 60;

// Campos que disparam alerta visual
var ALERTAS_CAMPOS = {
  ultimo_preventivo: {"Mais de 3 anos atrás":true,"Nunca realizei":true},
  sangramento_irregular: {"Sim, com frequência":true},
  dor_relacao: {"Sempre ou intensa":true},
  fogachos: {"Intenso, afeta minha qualidade de vida":true},
  incontinencia: {"Com frequência, perda significativa":true}
};

// ══════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════
var pacientes = [];
var filtroAtual = "todos";
var modalAberto = null;

// ══════════════════════════════════════════════════
// RELÓGIO
// ══════════════════════════════════════════════════
function tickClock(){
  var now = new Date();
  document.getElementById("clock").textContent =
    now.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
  document.getElementById("date-lbl").textContent =
    now.toLocaleDateString("pt-BR",{weekday:"long",day:"2-digit",month:"long"});
}
tickClock();
setInterval(tickClock, 1000);

// ══════════════════════════════════════════════════
// CARREGAR DADOS
// ══════════════════════════════════════════════════
async function carregar(manual){
  if(manual) document.getElementById("auto-lbl").textContent = "Atualizando...";
  try{
    var res = await fetch(APPS_SCRIPT_URL + "?t=" + Date.now());
    var data = await res.json();
    pacientes = Array.isArray(data) ? data.reverse() : [];
  } catch(e){
    // mantém lista atual em caso de falha de rede
    console.warn("Falha ao carregar:", e.message);
  }
  atualizarStats();
  renderLista();
  document.getElementById("auto-lbl").textContent = "Atualização automática";
}

// Auto-atualização
setInterval(function(){ carregar(false); }, INTERVALO_AUTO * 1000);
carregar(false);

// ══════════════════════════════════════════════════
// STATS
// ══════════════════════════════════════════════════
function temAnalise(p){
  var r = p["Resumo_Clinico_gemini"]||p["Resumoi_Clínico_gemini"]||p["Resumoi_Clinico_gemini"]||p["resumo_gemini"]||"";
  return r.trim().length > 10;
}

function temAlertaCritico(p){
  for(var campo in ALERTAS_CAMPOS){
    var val = p[campo]||"";
    if(ALERTAS_CAMPOS[campo][val]) return true;
  }
  return false;
}

function atualizarStats(){
  var total = pacientes.length;
  var ok = pacientes.filter(temAnalise).length;
  var alerta = pacientes.filter(temAlertaCritico).length;
  var sem = total - ok;
  document.getElementById("st-total").textContent = total;
  document.getElementById("st-ok").textContent = ok;
  document.getElementById("st-alerta").textContent = alerta;
  document.getElementById("st-aguard").textContent = sem;
}

// ══════════════════════════════════════════════════
// FILTRO E BUSCA
// ══════════════════════════════════════════════════
function setFiltro(f, btn){
  filtroAtual = f;
  document.querySelectorAll(".filter-btn").forEach(function(b){ b.classList.remove("active"); });
  btn.classList.add("active");
  renderLista();
}

function listaFiltrada(){
  var busca = (document.getElementById("busca").value||"").toLowerCase().trim();
  return pacientes.filter(function(p){
    var nm = (p.nome_paciente||p.nome||"").toLowerCase();
    if(busca && nm.indexOf(busca) === -1) return false;
    if(filtroAtual === "ok")     return temAnalise(p);
    if(filtroAtual === "sem")    return !temAnalise(p);
    if(filtroAtual === "alerta") return temAlertaCritico(p);
    return true;
  });
}

// ══════════════════════════════════════════════════
// RENDER LISTA
// ══════════════════════════════════════════════════
function inicialNome(p){
  var nm = p.nome_paciente||p.nome||"?";
  return nm.charAt(0).toUpperCase();
}

function fmtHora(s){
  if(!s) return "";
  var d = new Date(s); if(isNaN(d)) return s;
  return d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
}

function renderLista(){
  var lista = listaFiltrada();
  var el = document.getElementById("lista-pacientes");

  if(!lista.length){
    el.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div>Nenhuma paciente encontrada</div></div>';
    return;
  }

  el.innerHTML = lista.map(function(p, i){
    var nm = p.nome_paciente||p.nome||"Paciente";
    var anal = temAnalise(p);
    var alerta = temAlertaCritico(p);
    var motivo = p.motivo_consulta||"—";
    var hora = fmtHora(p.Data_Hora||p["Data/Hora"]||"");

    // Avatar cor
    var avCls = alerta ? "av-red" : anal ? "av-green" : "av-amber";

    // Badge status
    var badge = alerta
      ? '<span class="badge b-red">⚠ Alerta crítico</span>'
      : anal
        ? '<span class="badge b-green">✓ Análise pronta</span>'
        : '<span class="badge b-gray">Sem análise</span>';

    // Tags de alerta
    var alertTags = "";
    for(var campo in ALERTAS_CAMPOS){
      if(ALERTAS_CAMPOS[campo][p[campo]||""]){
        var labels = {
          ultimo_preventivo:"Preventivo atrasado",
          sangramento_irregular:"Sangramento irregular",
          dor_relacao:"Dor intensa na relação",
          fogachos:"Fogachos intensos",
          incontinencia:"Incontinência severa"
        };
        alertTags += '<span class="alert-tag">'+( labels[campo]||campo)+'</span>';
      }
    }

    return '<div class="pac-row" onclick="abrirModal('+i+')">'
      +'<div class="pac-avatar '+avCls+'">'+inicialNome(p)+'</div>'
      +'<div class="pac-info">'
        +'<div class="pac-name">'+nm+'</div>'
        +'<div class="pac-sub">'+(p.idade||"—")+' · '+motivo+'</div>'
        +(alertTags?'<div class="alert-tags">'+alertTags+'</div>':'')
      +'</div>'
      +'<div class="pac-right">'+badge+'<div class="pac-time" style="margin-top:4px">'+hora+'</div></div>'
      +'</div>';
  }).join("");
}

// ══════════════════════════════════════════════════
// MODAL DETALHES
// ══════════════════════════════════════════════════
function abrirModal(idx){
  // Acha a paciente na lista filtrada
  var lista = listaFiltrada();
  var p = lista[idx];
  if(!p) return;
  modalAberto = p;

  var nm = p.nome_paciente||p.nome||"Paciente";
  var hora = fmtHora(p.Data_Hora||p["Data/Hora"]||"");

  document.getElementById("modal-nome").textContent = nm;
  document.getElementById("modal-sub").textContent =
    (p.idade||"—") + " · " + (p.status_reprodutivo||"—") + (hora?" · Chegou às "+hora:"");

  // ── Alertas críticos
  var alertasHtml = "";
  var labels = {
    ultimo_preventivo:"Preventivo atrasado",
    sangramento_irregular:"Sangramento irregular",
    dor_relacao:"Dor intensa na relação",
    fogachos:"Fogachos intensos",
    incontinencia:"Incontinência severa"
  };
  for(var campo in ALERTAS_CAMPOS){
    if(ALERTAS_CAMPOS[campo][p[campo]||""]){
      alertasHtml += '<div class="alerta-item"><span>⚠️</span>'+(labels[campo]||campo)+': <strong>'+p[campo]+'</strong></div>';
    }
  }

  // ── Resumo Gemini
  var resumo = p["Resumo_Clinico_gemini"]||p["Resumoi_Clínico_gemini"]||p["Resumoi_Clinico_gemini"]||p["resumo_gemini"]||"";
  var alertasGemini = p["Alertas_imediatos_gemini"]||p["alertas_gemini"]||"";
  var procsRaw = p["Procedimentos_sugeridos_gemini"]||p["procedimentos_gemini"]||"";
  var procs = parseProcs(procsRaw);

  // ── Respostas relevantes
  var campos = [
    ["Motivo da consulta","motivo_consulta"],
    ["Ciclo menstrual","ciclo"],
    ["Último preventivo","ultimo_preventivo"],
    ["Contraceptivo","contraceptivo"],
    ["Dor na relação","dor_relacao"],
    ["Desejo sexual","libido"],
    ["Fogachos","fogachos"],
    ["Perda de urina","incontinencia"],
    ["Observações","observacao"]
  ];

  var infosHtml = '<div class="info-grid">'
    + campos.map(function(c){
        var val = p[c[1]]||"—";
        var isAlert = ALERTAS_CAMPOS[c[1]] && ALERTAS_CAMPOS[c[1]][val];
        return '<div class="info-item">'
          +'<div class="info-lbl">'+c[0]+'</div>'
          +'<div class="info-val'+(isAlert?" alert":"")+'">'+val+'</div>'
          +'</div>';
      }).join("")
    +'</div>';

  var html = "";

  if(alertasHtml){
    html += '<div class="modal-sec">⚠️ Alertas Críticos</div>'+alertasHtml;
  }

  if(resumo){
    html += '<div class="modal-sec">🤖 Resumo Gemini</div>'
      +'<div class="resumo-box">'+resumo+'</div>';
  }

  if(procs.length){
    html += '<div class="modal-sec">Condutas Sugeridas</div><div>'
      + procs.map(function(pr){
          var cls = pr.prioridade==="Alta"?"chip-h":pr.prioridade==="Média"?"chip-m":"chip-l";
          return '<span class="chip '+cls+'" title="'+(pr.justificativa||"")+'">'+pr.nome+' · '+(pr.prioridade||"")+'</span>';
        }).join("")
      +'</div>';
  }

  html += '<div class="modal-sec">Respostas da Triagem</div>'+infosHtml;

  document.getElementById("modal-body").innerHTML = html;
  document.getElementById("modal").style.display = "flex";
}

function fecharModal(){
  document.getElementById("modal").style.display = "none";
  modalAberto = null;
}

// Fechar com ESC
document.addEventListener("keydown", function(e){ if(e.key==="Escape") fecharModal(); });

// ══════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════
function parseProcs(raw){
  if(!raw) return [];
  if(Array.isArray(raw)) return raw;
  var s = String(raw).trim();
  try{ var a=JSON.parse(s); if(Array.isArray(a)) return a; }catch(e){}
  var m = s.match(/\[[\s\S]*\]/);
  if(m){ try{ return JSON.parse(m[0]); }catch(e){} }
  var objs = s.match(/\{[^}]+\}/g)||[];
  return objs.map(function(o){
    var n=(o.match(/"nome"\s*:\s*"([^"]+)"/))||[];
    var p=(o.match(/"prioridade"\s*:\s*"([^"]+)"/))||[];
    var j=(o.match(/"justificativa"\s*:\s*"([^"]+)"/))||[];
    return {nome:n[1]||"",prioridade:p[1]||"",justificativa:j[1]||""};
  }).filter(function(x){return x.nome;});
}
</script>
